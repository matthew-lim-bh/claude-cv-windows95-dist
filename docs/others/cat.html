<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEKO — Cat Tamagotchi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
  }

  #app {
    width: 420px;
    max-width: 100%;
  }

  h1 {
    text-align: center;
    color: #f7c5d5;
    font-size: 2rem;
    letter-spacing: 4px;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    color: #888;
    font-size: 0.75rem;
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  /* Cat display */
  #cat-panel {
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
  }

  #cat-ascii {
    font-size: 1.5rem;
    line-height: 1.6;
    white-space: pre;
    color: #f7c5d5;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }

  #cat-name {
    font-size: 1.2rem;
    color: #f7c5d5;
    margin-top: 8px;
    font-weight: bold;
  }

  #cat-mood-text {
    color: #aaa;
    font-size: 0.8rem;
    margin-top: 4px;
    min-height: 20px;
  }

  #time-display {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 0.65rem;
    color: #555;
  }

  /* Stats */
  #stats-panel {
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
  }

  .stat-label {
    width: 72px;
    font-size: 0.75rem;
    color: #aaa;
    flex-shrink: 0;
  }

  .stat-bar-bg {
    flex: 1;
    height: 10px;
    background: #0a0a1a;
    border-radius: 5px;
    overflow: hidden;
  }

  .stat-bar {
    height: 100%;
    border-radius: 5px;
    transition: width 0.5s ease, background 0.5s ease;
  }

  .stat-value {
    width: 32px;
    font-size: 0.75rem;
    color: #888;
    text-align: right;
    flex-shrink: 0;
  }

  /* Actions */
  #actions-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  button {
    background: #0f3460;
    color: #e0e0e0;
    border: 1px solid #1a5276;
    border-radius: 8px;
    padding: 12px 8px;
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  button:hover:not(:disabled) {
    background: #1a5276;
    border-color: #f7c5d5;
    color: #f7c5d5;
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  button.primary {
    grid-column: span 2;
    background: #533483;
    border-color: #7d56b8;
  }

  button.primary:hover:not(:disabled) {
    background: #7d56b8;
    border-color: #f7c5d5;
  }

  /* Event log */
  #log-panel {
    background: #0a0a1a;
    border: 2px solid #0f3460;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 16px;
    height: 120px;
    overflow-y: auto;
  }

  .log-entry {
    font-size: 0.75rem;
    color: #aaa;
    margin-bottom: 4px;
    padding-left: 8px;
    border-left: 2px solid #333;
    animation: fadein 0.3s ease;
  }

  .log-entry.event { border-color: #f39c12; color: #f7dc6f; }
  .log-entry.care  { border-color: #27ae60; color: #82e0aa; }
  .log-entry.warn  { border-color: #e74c3c; color: #f1948a; }
  .log-entry.game  { border-color: #8e44ad; color: #d7bde2; }

  @keyframes fadein { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; } }

  /* Mini-game overlay */
  #minigame {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 100;
  }

  #minigame.active { display: flex; }

  #minigame-box {
    background: #16213e;
    border: 2px solid #7d56b8;
    border-radius: 16px;
    padding: 24px;
    width: 360px;
    text-align: center;
  }

  #minigame-box h2 { color: #d7bde2; margin-bottom: 8px; letter-spacing: 2px; }
  #minigame-box p  { color: #aaa; font-size: 0.8rem; margin-bottom: 16px; }

  #game-area {
    background: #0a0a1a;
    border: 1px solid #333;
    border-radius: 8px;
    height: 160px;
    position: relative;
    overflow: hidden;
    cursor: none;
    margin-bottom: 16px;
  }

  #laser-dot {
    width: 16px;
    height: 16px;
    background: radial-gradient(circle, #ff4444, #ff000088);
    border-radius: 50%;
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 8px #ff4444;
  }

  #cat-cursor {
    width: 24px;
    height: 24px;
    position: absolute;
    font-size: 20px;
    transform: translate(-50%, -50%);
    transition: left 0.08s, top 0.08s;
    pointer-events: none;
  }

  #game-timer {
    font-size: 1.4rem;
    color: #f7c5d5;
    margin-bottom: 8px;
  }

  #game-score-display { color: #d7bde2; font-size: 0.85rem; margin-bottom: 12px; }

  /* Name screen */
  #name-screen {
    position: fixed;
    inset: 0;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 200;
    gap: 16px;
  }

  #name-screen h2 { color: #f7c5d5; letter-spacing: 3px; font-size: 1.5rem; }
  #name-screen p  { color: #888; font-size: 0.8rem; }

  #name-input {
    background: #0a0a1a;
    border: 2px solid #533483;
    border-radius: 8px;
    color: #f7c5d5;
    font-family: inherit;
    font-size: 1.1rem;
    padding: 10px 16px;
    text-align: center;
    outline: none;
    width: 200px;
    letter-spacing: 2px;
  }

  #name-input:focus { border-color: #7d56b8; }

  /* Away message */
  #away-msg {
    display: none;
    background: #1a1a0e;
    border: 2px solid #f39c12;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    font-size: 0.8rem;
    color: #f7dc6f;
    line-height: 1.6;
  }

  /* Coins */
  #coins-display {
    text-align: right;
    font-size: 0.8rem;
    color: #f7dc6f;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .coin { color: #f1c40f; }

  /* Sleeping overlay on cat */
  #zzz {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1rem;
    color: #aaa;
    opacity: 0;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<!-- Name screen -->
<div id="name-screen">
  <div style="font-size:3rem">🐱</div>
  <h2>NEKO</h2>
  <p>A tiny cat is waiting for you.</p>
  <input id="name-input" type="text" maxlength="12" placeholder="Name your cat..." />
  <button onclick="startGame()" style="padding: 12px 32px; font-size: 0.9rem;">Adopt her ♡</button>
  <p style="margin-top:8px; font-size:0.7rem; color:#555">Press Enter or click to start</p>
</div>

<!-- Main game -->
<div id="app">
  <h1>NEKO</h1>
  <div class="subtitle">★ CAT COMPANION ★</div>

  <div id="away-msg"></div>

  <div id="cat-panel">
    <div id="time-display"></div>
    <div id="zzz">z z z</div>
    <div id="cat-ascii"></div>
    <div id="cat-name"></div>
    <div id="cat-mood-text"></div>
  </div>

  <div id="coins-display"><span class="coin">✦</span> <span id="coins">0</span> Neko Coins</div>

  <div id="stats-panel">
    <div class="stat-row">
      <div class="stat-label">🍣 Hunger</div>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-hunger"></div></div>
      <div class="stat-value" id="val-hunger"></div>
    </div>
    <div class="stat-row">
      <div class="stat-label">⚡ Energy</div>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-energy"></div></div>
      <div class="stat-value" id="val-energy"></div>
    </div>
    <div class="stat-row">
      <div class="stat-label">😸 Mood</div>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-mood"></div></div>
      <div class="stat-value" id="val-mood"></div>
    </div>
    <div class="stat-row">
      <div class="stat-label">🛁 Hygiene</div>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-hygiene"></div></div>
      <div class="stat-value" id="val-hygiene"></div>
    </div>
    <div class="stat-row">
      <div class="stat-label">❤️ Health</div>
      <div class="stat-bar-bg"><div class="stat-bar" id="bar-health"></div></div>
      <div class="stat-value" id="val-health"></div>
    </div>
  </div>

  <div id="actions-panel">
    <button onclick="doAction('feed-kibble')">🍣 Kibble</button>
    <button onclick="doAction('feed-treat')">🐟 Treat</button>
    <button onclick="doAction('brush')">🪮 Brush</button>
    <button onclick="doAction('cuddle')">🤗 Cuddle</button>
    <button onclick="doAction('sleep')" id="btn-sleep">💤 Rest</button>
    <button onclick="doAction('medicine')" id="btn-medicine">💊 Medicine</button>
    <button onclick="openMiniGame()" class="primary" id="btn-play">🎮 Play — Laser Chase</button>
  </div>

  <div id="log-panel"></div>
</div>

<!-- Mini-game overlay -->
<div id="minigame">
  <div id="minigame-box">
    <h2>🔴 LASER CHASE</h2>
    <p>Move your mouse! Help your cat catch the dot.</p>
    <div id="game-timer">10</div>
    <div id="game-score-display">Score: 0</div>
    <div id="game-area">
      <div id="laser-dot"></div>
      <div id="cat-cursor">🐱</div>
    </div>
    <button onclick="closeMiniGame()">Bail out (no reward)</button>
  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const SAVE_KEY = 'neko_save_v1';

const DECAY_RATES = {
  hunger:  0.8,   // per minute
  energy:  0.4,
  mood:    0.5,
  hygiene: 0.25,
  health:  0,     // only drops from neglect
};

let state = null;

function defaultState(name) {
  return {
    name,
    hunger:  80,
    energy:  90,
    mood:    85,
    hygiene: 90,
    health:  100,
    coins:   10,
    lastSave: Date.now(),
    sleeping: false,
    age: 0,        // days
    personality: { lazy: 0, playful: 0, curious: 0 }, // emerge over time
  };
}

// ============================================================
// SAVE / LOAD
// ============================================================
function save() {
  state.lastSave = Date.now();
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

function load() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}

// ============================================================
// AWAY TIME CATCH-UP
// ============================================================
function applyDecay(minutes) {
  state.hunger  = Math.max(0, state.hunger  - DECAY_RATES.hunger  * minutes);
  state.energy  = Math.max(0, state.energy  - DECAY_RATES.energy  * minutes);
  state.mood    = Math.max(0, state.mood    - DECAY_RATES.mood    * minutes);
  state.hygiene = Math.max(0, state.hygiene - DECAY_RATES.hygiene * minutes);

  // Health suffers when multiple stats are critically low
  const critical = [state.hunger, state.energy, state.mood].filter(v => v < 20).length;
  state.health = Math.max(0, state.health - critical * 0.3 * minutes);
}

function buildAwayMessage(minutes) {
  if (minutes < 5) return null;
  const hrs = Math.floor(minutes / 60);
  const mins = Math.round(minutes % 60);
  const timeStr = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;

  const events = [];
  if (state.hunger < 30) events.push(`${state.name} got really hungry while you were away.`);
  if (state.mood < 30)   events.push(`${state.name} felt lonely and batted things off the shelf.`);
  if (state.hygiene < 40) events.push(`${state.name} tried to groom herself but could use a brush.`);
  if (state.health < 60) events.push(`${state.name} doesn't look so good. Maybe she needs medicine.`);
  if (events.length === 0) events.push(`${state.name} napped and seemed content.`);

  return `⏰ While you were away (${timeStr}):\n${events.join('\n')}`;
}

// ============================================================
// CAT APPEARANCE
// ============================================================
const CAT_STATES = {
  happy: `  /\\_/\\  \n ( ^ω^ ) \n  > ♡ <  `,
  content:`  /\\_/\\  \n ( ·ω· ) \n  >   <  `,
  hungry: `  /\\_/\\  \n ( ó﹏ò ) \n  >   <  `,
  sad:    `  /\\_/\\  \n ( T_T ) \n  >   <  `,
  sick:   `  /\\_/\\  \n ( x_x ) \n  >   <  `,
  sleepy: `  /\\_/\\  \n ( -ω- ) \n  > zzz  `,
  playing:`  /\\_/\\  \n ( >ω< ) \n  /   \\  `,
  excited:`  /\\_/\\  \n ( ★ω★ ) \n  /   \\  `,
};

function getCatState() {
  if (state.sleeping) return 'sleepy';
  if (state.health < 30) return 'sick';
  if (state.hunger < 20) return 'hungry';
  if (state.mood < 25 || state.energy < 20) return 'sad';
  if (state.mood > 80 && state.hunger > 60) return 'happy';
  return 'content';
}

const MOOD_LINES = {
  happy:   ['Purring loudly ♡', 'Headbutting your hand ♡', 'Kneading the air ♡'],
  content: ['Watching the window', 'Flicking her tail slowly', 'Grooming a paw'],
  hungry:  ['Staring at her empty bowl', 'MEOWing at you', 'Pawing at the cabinet'],
  sad:     ['Hiding under the blanket', 'Slow blinks, but sad', 'Quietly meowing'],
  sick:    ['Lying flat, not eating', 'Needs medicine!', 'Feeling rough...'],
  sleepy:  ['Fast asleep', 'Twitching in a dream', 'Curled up tight'],
  playing: ['Chasing the dot!', 'ZOOM across the floor', 'Full attack mode'],
  excited: ['Eyes wide!', 'Tail straight up!', 'Chirping at you!'],
};

function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ============================================================
// STAT BAR COLOR
// ============================================================
function statColor(v) {
  if (v > 60) return '#27ae60';
  if (v > 30) return '#f39c12';
  return '#e74c3c';
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const cs = getCatState();

  document.getElementById('cat-ascii').textContent = CAT_STATES[cs];
  document.getElementById('cat-name').textContent = state.name;
  document.getElementById('cat-mood-text').textContent = randomFrom(MOOD_LINES[cs]);
  document.getElementById('zzz').style.opacity = state.sleeping ? '1' : '0';

  const stats = ['hunger','energy','mood','hygiene','health'];
  stats.forEach(s => {
    const v = Math.round(state[s]);
    document.getElementById(`bar-${s}`).style.width = v + '%';
    document.getElementById(`bar-${s}`).style.background = statColor(v);
    document.getElementById(`val-${s}`).textContent = v;
  });

  document.getElementById('coins').textContent = state.coins;

  // Button states
  document.getElementById('btn-sleep').textContent = state.sleeping ? '☀️ Wake up' : '💤 Rest';
  document.getElementById('btn-medicine').disabled = state.health > 80;
  document.getElementById('btn-play').disabled = state.sleeping || state.energy < 15;

  // Time
  const now = new Date();
  document.getElementById('time-display').textContent =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ============================================================
// LOGGING
// ============================================================
function log(msg, type = '') {
  const panel = document.getElementById('log-panel');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.textContent = msg;
  panel.insertBefore(entry, panel.firstChild);
  while (panel.children.length > 40) panel.removeChild(panel.lastChild);
}

// ============================================================
// ACTIONS
// ============================================================
function doAction(action) {
  if (state.sleeping && action !== 'sleep') {
    log(`${state.name} is asleep. Wake her first.`, 'warn');
    return;
  }

  switch(action) {
    case 'feed-kibble':
      if (state.hunger > 90) { log('She\'s not hungry right now.', 'warn'); return; }
      state.hunger  = Math.min(100, state.hunger + 30);
      state.mood    = Math.min(100, state.mood + 5);
      state.health  = Math.min(100, state.health + 2);
      log(`Fed ${state.name} some kibble. Nom nom.`, 'care');
      personality('curious', 0.5);
      break;

    case 'feed-treat':
      if (state.hunger > 95) { log('She\'s stuffed! No treats right now.', 'warn'); return; }
      state.hunger  = Math.min(100, state.hunger + 15);
      state.mood    = Math.min(100, state.mood + 20);
      log(`Treat time! ${state.name} is thrilled.`, 'care');
      personality('playful', 1);
      break;

    case 'brush':
      state.hygiene = Math.min(100, state.hygiene + 35);
      state.mood    = Math.min(100, state.mood + 10);
      log(`Brushed ${state.name}. She purrs and tilts her head.`, 'care');
      break;

    case 'cuddle':
      if (state.mood > 95) { log('She squirms away — too much love!', 'warn'); return; }
      state.mood    = Math.min(100, state.mood + 25);
      state.energy  = Math.max(0, state.energy - 5);
      log(`Cuddled ${state.name}. She kneads your arm.`, 'care');
      personality('lazy', 0.5);
      break;

    case 'sleep':
      state.sleeping = !state.sleeping;
      if (state.sleeping) {
        log(`${state.name} curls up for a nap. Energy restoring...`, 'care');
      } else {
        log(`${state.name} wakes up and stretches. Mrrrow.`, 'care');
      }
      break;

    case 'medicine':
      if (state.health > 80) { log('She\'s healthy, no medicine needed.', 'warn'); return; }
      state.health  = Math.min(100, state.health + 40);
      state.mood    = Math.max(0, state.mood - 15);
      log(`Gave ${state.name} medicine. She gave you a death stare.`, 'care');
      break;
  }

  save();
  render();
}

function personality(trait, amount) {
  state.personality[trait] = (state.personality[trait] || 0) + amount;
}

// ============================================================
// RANDOM EVENTS (every ~30 seconds real time)
// ============================================================
const EVENTS = [
  { msg: (n) => `${n} knocked your water glass off the table.`, mood: +5, fn: s => s.mood += 5 },
  { msg: (n) => `${n} found a bug and is staring at it intensely.`, fn: s => {} },
  { msg: (n) => `${n} brought you a toy as a gift!`, coins: +3, fn: s => { s.coins += 3; s.mood += 5; } },
  { msg: (n) => `${n} had the zoomies for 10 seconds.`, fn: s => { s.energy -= 8; s.mood += 10; } },
  { msg: (n) => `${n} meowed at the wall. Mysterious.`, fn: s => {} },
  { msg: (n) => `${n} knocked her food bowl over (hungry?).`, fn: s => { s.hunger -= 5; } },
  { msg: (n) => `${n} sat on your keyboard. Classic.`, fn: s => { s.mood += 3; } },
];

function triggerRandomEvent() {
  if (state.sleeping) return;
  if (Math.random() > 0.4) return;  // 40% chance each tick
  const ev = EVENTS[Math.floor(Math.random() * EVENTS.length)];
  ev.fn(state);
  // clamp
  ['hunger','energy','mood','hygiene','health'].forEach(k => {
    state[k] = Math.max(0, Math.min(100, state[k]));
  });
  log(ev.msg(state.name), 'event');
  save();
  render();
}

// ============================================================
// GAME TICK (every 10 seconds = ~1 min of in-game decay)
// ============================================================
setInterval(() => {
  if (!state) return;
  if (state.sleeping) {
    state.energy = Math.min(100, state.energy + 2);
  } else {
    applyDecay(1);
  }
  // Health drain if multiple stats critical
  ['hunger','mood'].forEach(k => {
    if (state[k] < 15) state.health = Math.max(0, state.health - 0.5);
  });
  triggerRandomEvent();
  save();
  render();
}, 10_000);

// Clock re-render every second
setInterval(() => {
  if (state) render();
}, 1_000);

// ============================================================
// MINI-GAME — Laser Chase
// ============================================================
let gameActive = false;
let gameScore = 0;
let gameTimer = 0;
let gameInterval = null;
let dotX = 50, dotY = 50;
let catX = 50, catY = 50;
let dotVX = 3, dotVY = 2;
let mouseMoveTimer = null;

function openMiniGame() {
  if (!state || state.sleeping || state.energy < 15) return;
  gameScore = 0;
  gameTimer = 15;
  dotX = 50; dotY = 50;
  catX = 180; catY = 80;
  dotVX = 4 * (Math.random() > 0.5 ? 1 : -1);
  dotVY = 3 * (Math.random() > 0.5 ? 1 : -1);

  document.getElementById('minigame').classList.add('active');
  document.getElementById('game-score-display').textContent = 'Score: 0';
  document.getElementById('game-timer').textContent = gameTimer;
  gameActive = true;

  // Countdown
  gameInterval = setInterval(() => {
    gameTimer--;
    document.getElementById('game-timer').textContent = gameTimer;
    if (gameTimer <= 0) endMiniGame();
  }, 1000);

  // Game loop
  requestAnimationFrame(gameLoop);
}

function gameLoop() {
  if (!gameActive) return;
  const area = document.getElementById('game-area');
  const w = area.clientWidth, h = area.clientHeight;

  // Move dot (bounces)
  dotX += dotVX;
  dotY += dotVY;
  if (dotX < 0 || dotX > w) dotVX *= -1;
  if (dotY < 0 || dotY > h) dotVY *= -1;
  dotX = Math.max(0, Math.min(w, dotX));
  dotY = Math.max(0, Math.min(h, dotY));

  // Cat chases dot slowly
  const dx = dotX - catX, dy = dotY - catY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > 2) {
    catX += (dx / dist) * 2.5;
    catY += (dy / dist) * 2.5;
  }

  // Collision — cat catches dot
  if (dist < 20) {
    gameScore += 1;
    document.getElementById('game-score-display').textContent = `Score: ${gameScore}`;
    // Reposition dot randomly
    dotX = 20 + Math.random() * (w - 40);
    dotY = 20 + Math.random() * (h - 40);
    dotVX *= 1.1; dotVY *= 1.1; // speed up a bit
  }

  document.getElementById('laser-dot').style.left = dotX + 'px';
  document.getElementById('laser-dot').style.top  = dotY + 'px';
  document.getElementById('cat-cursor').style.left = catX + 'px';
  document.getElementById('cat-cursor').style.top  = catY + 'px';

  requestAnimationFrame(gameLoop);
}

// Mouse controls the laser dot
document.getElementById('game-area').addEventListener('mousemove', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  dotX = e.clientX - rect.left;
  dotY = e.clientY - rect.top;
  dotVX = 0; dotVY = 0; // pause bounce when mouse controls it
});

// Touch support
document.getElementById('game-area').addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = e.currentTarget.getBoundingClientRect();
  dotX = e.touches[0].clientX - rect.left;
  dotY = e.touches[0].clientY - rect.top;
  dotVX = 0; dotVY = 0;
}, { passive: false });

function endMiniGame() {
  gameActive = false;
  clearInterval(gameInterval);

  const coins = Math.floor(gameScore * 1.5) + 2;
  state.coins += coins;
  state.mood   = Math.min(100, state.mood + Math.min(gameScore * 3, 30));
  state.energy = Math.max(0, state.energy - 15);
  personality('playful', gameScore);

  save();
  render();

  log(`Laser Chase: caught ${gameScore} times! Earned ${coins} Neko Coins.`, 'game');
  document.getElementById('minigame').classList.remove('active');
}

function closeMiniGame() {
  gameActive = false;
  clearInterval(gameInterval);
  document.getElementById('minigame').classList.remove('active');
  log('Left the game early — no reward.', 'warn');
}

// ============================================================
// START GAME
// ============================================================
function startGame() {
  const nameEl = document.getElementById('name-input');
  const name = nameEl.value.trim() || 'Mochi';

  const saved = load();
  if (saved) {
    state = saved;
    const minutesAway = (Date.now() - state.lastSave) / 60_000;
    applyDecay(minutesAway);

    const awayMsg = buildAwayMessage(minutesAway);
    if (awayMsg) {
      const el = document.getElementById('away-msg');
      el.style.display = 'block';
      el.textContent = awayMsg;
      setTimeout(() => el.style.display = 'none', 8000);
    }
    log(`Welcome back! ${state.name} missed you.`, 'event');
  } else {
    state = defaultState(name);
    log(`Welcome, ${name}! Your cat is waiting for you.`, 'event');
  }

  document.getElementById('name-screen').style.display = 'none';
  save();
  render();
}

// Reset save for fresh start (dev helper)
function resetGame() {
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

// Enter on name screen
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

// Check for existing save on load — auto-continue
window.addEventListener('load', () => {
  const saved = load();
  if (saved) {
    // Pre-fill name and auto-start
    document.getElementById('name-input').value = saved.name;
    startGame();
  }
});
</script>
