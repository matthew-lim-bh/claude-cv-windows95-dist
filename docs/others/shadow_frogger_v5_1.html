<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Frogger v5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
#wrap{position:relative;width:480px;max-width:100%}
canvas{display:block;width:100%;cursor:none}
#hud{position:absolute;top:6px;left:10px;font-size:12px;color:#fff;text-shadow:0 1px 3px #000b;pointer-events:none;font-family:monospace}
#msg{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;background:rgba(0,0,0,.7);padding:14px 24px;border-radius:10px;font-size:14px;line-height:1.8;pointer-events:none;display:none;min-width:240px;font-family:monospace}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<div id="hud"><span id="sc">score: 0</span> &nbsp; <span id="lv">level: 1</span> &nbsp; <span id="li">❤️❤️❤️</span></div>
<div id="msg"></div>
</div>


<!-- CONTEXT
i got a new game idea of frogger, but with a twist.
the player stands on the an overhead bridge, and tries to play the frogger game with the
shadow against the free flowing traffic below. When the player is hit (the shadow is hit), \

the main view is a partial view of the bridge and player, and the shadow of the player.
The bridge and player is on the horizontal (left-right), and the vehicles goes top to bottom.

after crossing the median of the road, the vehicles goes bottom to top

The visualizer is timing out on my end so I've saved it as a standalone HTML file instead —
open it directly in your browser.

Here's what changed:

Road is drawn full-height across the entire canvas first (top to bottom)
Bridge sits in the lower-middle section, occluding the road behind it — it's clearly a structure floating over the road, not glued to the bottom
Peek strip at the bottom shows the road continuing underneath the bridge — same lane lines, faint median, with a shadow cast downward from the bridge underside
Pillars connect the bridge deck down through the peek strip to reinforce the elevated structure feel
-->
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const msgEl=document.getElementById('msg');
const scEl=document.getElementById('sc'),lvEl=document.getElementById('lv'),liEl=document.getElementById('li');
const W=480,H=580;
cv.width=W;cv.height=H;

// Layout:
// Road runs full height, bridge floats in lower area.
// Sun from below — shadows cast UPWARD onto road above the bridge.
// Player's shadow appears on the road above the bridge.

const BRIDGE_Y   = 270;
const BRIDGE_H   = 38;
const BRIDGE_BOT = BRIDGE_Y + BRIDGE_H;

const ROAD_Y  = 0;
const ROAD_H  = H;   // cars run entire canvas height (wrap around)

const PEEK_Y  = BRIDGE_BOT;
const PEEK_H  = H - BRIDGE_BOT;

const SAFE_W  = 44;
const NUM_LANES = 6;
const LANE_W  = (W - SAFE_W*2) / NUM_LANES;
const MEDIAN_X = W / 2;

let px = W - SAFE_W/2;
const PW=18, PH=28;
const PLAYER_Y = BRIDGE_Y + 10;

let sx, sy;
const SHAD_W=24, SHAD_H=28;

// Shadow on the road ABOVE the bridge (sun from below casts shadow upward)
// Further from bridge = further up the road
const SHADOW_Y_MIN = 20;
const SHADOW_Y_MAX = BRIDGE_Y - 10;
const SHADOW_Y_DEFAULT = BRIDGE_Y - 100;

let score=0,lives=3,level=1,state='start';
let hitTimer=0; const HIT_DUR=85;
let hitShake=0, cars=[];

function laneX(i){return SAFE_W+i*LANE_W+LANE_W/2;}

function initLevel(){
  cars=[];
  const base=1.1+(level-1)*0.25;
  for(let i=0;i<NUM_LANES;i++){
    const dir=i<NUM_LANES/2?1:-1;
    const boost=(i/(NUM_LANES-1))*0.5;
    const spd=(base+Math.random()*0.7+boost)*dir;
    const count=2+Math.floor(Math.random()*2);
    const gap=ROAD_H/count;
    const cw=LANE_W*0.72, ch=36+Math.random()*18;
    for(let j=0;j<count;j++){
      const startY=dir>0
        ?ROAD_Y+j*gap+Math.random()*gap*0.3
        :ROAD_Y+ROAD_H-j*gap-ch-Math.random()*gap*0.3;
      cars.push({li:i,y:startY,w:cw,h:ch,spd,col:['#c0392b','#2980b9','#27ae60','#e67e22','#8e44ad','#16a085'][i%6]});
    }
  }
  px=W-SAFE_W/2; sy=SHADOW_Y_DEFAULT; sx=px;
}

const STEP=LANE_W, VSTEP=6;
document.addEventListener('keydown',e=>{
  if(state==='start'){state='play';hideMsg();return;}
  if(state==='dead'||state==='win'){adv();return;}
  if(state!=='play')return;
  if(e.key==='ArrowLeft'||e.key==='a'){px-=STEP;e.preventDefault();}
  if(e.key==='ArrowRight'||e.key==='d'){px+=STEP;e.preventDefault();}
  if(e.key==='ArrowUp'||e.key==='w'){sy-=VSTEP;e.preventDefault();}
  if(e.key==='ArrowDown'||e.key==='s'){sy+=VSTEP;e.preventDefault();}
  clamp();chkWin();
});
let tSX,tSY;
cv.addEventListener('touchstart',e=>{tSX=e.touches[0].clientX;tSY=e.touches[0].clientY;e.preventDefault();},{passive:false});
cv.addEventListener('touchend',e=>{
  if(state==='start'){state='play';hideMsg();return;}
  if(state==='dead'||state==='win'){adv();return;}
  if(state!=='play')return;
  const dx=e.changedTouches[0].clientX-tSX,dy=e.changedTouches[0].clientY-tSY;
  Math.abs(dx)>Math.abs(dy)?px+=dx>0?STEP:-STEP:sy+=dy>0?VSTEP:-VSTEP;
  clamp();chkWin();e.preventDefault();
},{passive:false});

function clamp(){px=Math.max(8,Math.min(W-8,px));sx=px;sy=Math.max(SHADOW_Y_MIN,Math.min(SHADOW_Y_MAX,sy));}
function chkWin(){if(px<=SAFE_W+8){score+=100*level;state='win';showMsg(`🎉 Road crossed!<br>+${100*level} pts<br><small>any key/tap to continue</small>`);}}
function adv(){if(state==='dead'){score=0;lives=3;level=1;}else level++;state='play';hideMsg();initLevel();}

function overlaps(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function chkHit(){
  if(sx>W-SAFE_W||sx<SAFE_W)return;
  for(const c of cars){
    const cx=laneX(c.li)-c.w/2;
    const shadY = sy - SHAD_H * 0.4;
    if(overlaps(sx-SHAD_W/2, shadY, SHAD_W, SHAD_H*0.8, cx, c.y, c.w, c.h)){doHit();return;}
  }
}
function doHit(){
  if(state!=='play')return;
  lives--;state='hit';hitTimer=HIT_DUR;hitShake=20;
  const d=(HIT_DUR/60)*1000+350;
  if(lives<=0)setTimeout(()=>{state='dead';showMsg(`💥 Game over!<br>Score: ${score}<br><small>any key/tap to restart</small>`);},d);
  else setTimeout(()=>{px=W-SAFE_W/2;sx=px;sy=SHADOW_Y_DEFAULT;state='play';},d);
}

function update(){
  if(state!=='play'&&state!=='hit')return;
  const sl=state==='hit'?0.35:1;
  cars.forEach(c=>{
    c.y+=c.spd*sl;
    if(c.spd>0&&c.y>ROAD_H)c.y=-c.h;
    if(c.spd<0&&c.y+c.h<0)c.y=ROAD_H;
  });
  if(state==='play')chkHit();
  if(state==='hit'){hitTimer--;if(hitShake>0)hitShake--;}
}

function drawFullRoad(){
  ctx.fillStyle='#2a2a2a';
  ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.strokeStyle='#ffffff1a';ctx.lineWidth=1;ctx.setLineDash([10,10]);
  for(let i=1;i<NUM_LANES;i++){
    const x=SAFE_W+i*LANE_W;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  ctx.setLineDash([]);ctx.restore();
  ctx.strokeStyle='#f1c40f';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(MEDIAN_X-3,0);ctx.lineTo(MEDIAN_X-3,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(MEDIAN_X+3,0);ctx.lineTo(MEDIAN_X+3,H);ctx.stroke();
  ctx.fillStyle='#2980b940';ctx.fillRect(0,0,SAFE_W,H);
  ctx.fillStyle='#27ae6040';ctx.fillRect(W-SAFE_W,0,SAFE_W,H);
}

function drawRoadLabelsAndArrows(){
  ctx.fillStyle='#ffffff18';ctx.font='13px monospace';ctx.textAlign='center';
  for(let i=0;i<NUM_LANES;i++)ctx.fillText(i<NUM_LANES/2?'↓':'↑',laneX(i),BRIDGE_Y/2);
  ctx.font='9px monospace';
  ctx.save();ctx.fillStyle='#7ec8f0';ctx.translate(SAFE_W/2,BRIDGE_Y/2);ctx.rotate(-Math.PI/2);ctx.fillText('◄ GOAL',0,4);ctx.restore();
  ctx.save();ctx.fillStyle='#a8ffc0';ctx.translate(W-SAFE_W/2,BRIDGE_Y/2);ctx.rotate(-Math.PI/2);ctx.fillText('START',0,4);ctx.restore();
  const dg=ctx.createLinearGradient(W*0.5,0,W,0);
  dg.addColorStop(0,'rgba(0,0,0,0)');dg.addColorStop(1,'rgba(0,0,0,0.2)');
  ctx.fillStyle=dg;ctx.fillRect(0,0,W,BRIDGE_Y);
}

function drawPeekStrip(){
  // Darker tint — road continues under bridge
  ctx.fillStyle='#1e1c1a';
  ctx.fillRect(0,PEEK_Y,W,PEEK_H);
  ctx.save();
  ctx.strokeStyle='#ffffff0d';ctx.lineWidth=1;ctx.setLineDash([10,10]);
  for(let i=1;i<NUM_LANES;i++){
    const x=SAFE_W+i*LANE_W;
    ctx.beginPath();ctx.moveTo(x,PEEK_Y);ctx.lineTo(x,PEEK_Y+PEEK_H);ctx.stroke();
  }
  ctx.setLineDash([]);ctx.restore();
  ctx.strokeStyle='#f1c40f33';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(MEDIAN_X-3,PEEK_Y);ctx.lineTo(MEDIAN_X-3,PEEK_Y+PEEK_H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(MEDIAN_X+3,PEEK_Y);ctx.lineTo(MEDIAN_X+3,PEEK_Y+PEEK_H);ctx.stroke();
  // Shadow cast downward from bridge underside
  const ug=ctx.createLinearGradient(0,PEEK_Y,0,PEEK_Y+32);
  ug.addColorStop(0,'rgba(0,0,0,0.6)');
  ug.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ug;ctx.fillRect(0,PEEK_Y,W,32);
}

function drawCarsInZone(yMin, yMax){
  ctx.save();
  ctx.beginPath();ctx.rect(0,yMin,W,yMax-yMin);ctx.clip();
  cars.forEach(c=>{
    const cx=laneX(c.li)-c.w/2;
    ctx.fillStyle=c.col;rrect(cx,c.y,c.w,c.h,4);ctx.fill();
    ctx.fillStyle='#ffffffaa';
    const wh=c.h*0.32,wy=c.spd>0?c.y+3:c.y+c.h-3-wh;
    rrect(cx+c.w*0.18,wy,c.w*0.64,wh,2);ctx.fill();
    ctx.fillStyle='#111';
    [[cx+3,c.y+4],[cx+c.w-7,c.y+4],[cx+3,c.y+c.h-8],[cx+c.w-7,c.y+c.h-8]].forEach(([wx,wy2])=>{
      ctx.beginPath();ctx.ellipse(wx+2,wy2+2,4,3,0,0,Math.PI*2);ctx.fill();
    });
    ctx.fillStyle=c.spd>0?'#ff444488':'#ffe97788';
    ctx.fillRect(cx+3,c.spd>0?c.y+c.h-5:c.y,c.w-6,4);
  });
  ctx.restore();
}

function drawShadowAndRay(){
  if(state==='hit')return;
  const inSafe=sx>W-SAFE_W||sx<SAFE_W;
  const al=inSafe?0.25:1;
// Dynamic bridge shadow — sun angle derived from shadow position
  // Further up sy = higher sun = longer bridge shadow
  const distFromBridge = BRIDGE_Y - sy;
  const bridgeShadowH = Math.max(0, distFromBridge * 1.5 + 8);
  if(bridgeShadowH > 0){
    ctx.save();
    const bTop = BRIDGE_Y - bridgeShadowH;
    const sH = bridgeShadowH;
    // Full bridge silhouette shadow — scales with sun angle
    ctx.globalAlpha=0.18;
    ctx.fillStyle='#000';
    // Deck shadow (wide bar)
    const deckH = sH * 0.25;
    ctx.fillRect(0, bTop + sH * 0.55, W, deckH);
    // Top railing shadow
    const railH = sH * 0.12;
    ctx.fillRect(0, bTop + sH * 0.45, W, railH);
    // Railing picket shadows
    ctx.globalAlpha=0.12;
    for(let x=20;x<W;x+=32){
      ctx.fillRect(x, bTop + sH * 0.35, 3, sH * 0.22);
    }
    // Bottom edge shadow
    ctx.globalAlpha=0.15;
    ctx.fillRect(0, bTop + sH * 0.8, W, sH * 0.06);
    // Pillar shadows
    ctx.globalAlpha=0.1;
    for(let x=100;x<W;x+=140){
      ctx.fillRect(x-8, bTop + sH * 0.5, 16, sH * 0.35);
    }
    // Soft gradient over the whole shadow for depth
    const bsg=ctx.createLinearGradient(0,bTop,0,BRIDGE_Y);
    bsg.addColorStop(0,'rgba(0,0,0,0)');
    bsg.addColorStop(0.4,'rgba(0,0,0,0.08)');
    bsg.addColorStop(1,'rgba(0,0,0,0.15)');
    ctx.globalAlpha=1;
    ctx.fillStyle=bsg;ctx.fillRect(0,bTop,W,bridgeShadowH);
    ctx.restore();
  }
  // Ray from player on bridge upward to shadow on road
  const rayX=px, rayY=BRIDGE_Y - 2;
  const targX=sx, targY=sy;
  ctx.save();
  ctx.globalAlpha=al*0.5;
  const rg=ctx.createLinearGradient(rayX,rayY,targX,targY);
  rg.addColorStop(0,'rgba(255,230,120,0.8)');
  rg.addColorStop(0.5,'rgba(255,220,100,0.25)');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.strokeStyle=rg;ctx.lineWidth=2;ctx.setLineDash([6,5]);
  ctx.beginPath();ctx.moveTo(rayX,rayY);ctx.lineTo(targX,targY);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
  // Silhouette on road above bridge
  ctx.save();
  ctx.globalAlpha=al*0.85;
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(sx,sy+SHAD_H*0.05,SHAD_W*0.32,SHAD_H*0.28,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(sx,sy-SHAD_H*0.28,SHAD_W*0.18,SHAD_H*0.14,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(sx-SHAD_W*0.5,sy+SHAD_H*0.02,SHAD_W*0.2,SHAD_H*0.07,-.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(sx+SHAD_W*0.5,sy+SHAD_H*0.02,SHAD_W*0.2,SHAD_H*0.07,.2,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=al*0.22;
  ctx.beginPath();ctx.ellipse(sx,sy+SHAD_H*0.38,SHAD_W*0.42,SHAD_H*0.06,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBridge(){
  // Underside
  ctx.fillStyle='#1a1714';ctx.fillRect(0,BRIDGE_BOT-4,W,4);
  // Thin pillars
  ctx.fillStyle='#35302a';
  for(let x=100;x<W;x+=140)ctx.fillRect(x-6,BRIDGE_BOT-2,12,H-(BRIDGE_BOT-2));
  // Deck
  const g=ctx.createLinearGradient(0,BRIDGE_Y,0,BRIDGE_BOT);
  g.addColorStop(0,'#72685a');g.addColorStop(1,'#4e4840');
  ctx.fillStyle=g;ctx.fillRect(0,BRIDGE_Y,W,BRIDGE_H);
  // Walkway
  ctx.fillStyle='#a09080';ctx.fillRect(0,BRIDGE_Y+6,W,BRIDGE_H-12);
  ctx.strokeStyle='#8a7a6a';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,BRIDGE_Y+6);ctx.lineTo(W,BRIDGE_Y+6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,BRIDGE_BOT-6);ctx.lineTo(W,BRIDGE_BOT-6);ctx.stroke();
  // Top railing - thin
  ctx.fillStyle='#24201c';ctx.fillRect(0,BRIDGE_Y,W,5);
  ctx.fillStyle='#34302a';
  for(let x=20;x<W;x+=32)ctx.fillRect(x,BRIDGE_Y,3,16);
  // Bottom edge
  ctx.fillStyle='#24201c';ctx.fillRect(0,BRIDGE_BOT-5,W,5);
}

function drawPlayer(){
  const shake=hitShake>0?(Math.random()-.5)*hitShake*0.9:0;
  const bpx=px+shake, bpy=PLAYER_Y+(hitShake>0?(Math.random()-.5)*hitShake*0.4:0);
  ctx.fillStyle='#e74c3c';rrect(bpx-PW/2,bpy,PW,PH,3);ctx.fill();
  ctx.fillStyle='#f0d9b5';ctx.beginPath();ctx.ellipse(bpx,bpy-9,8,9,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#e74c3c';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(bpx-PW/2,bpy+8);ctx.lineTo(bpx-PW/2-11,BRIDGE_Y+5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(bpx+PW/2,bpy+8);ctx.lineTo(bpx+PW/2+11,BRIDGE_Y+5);ctx.stroke();
}

function drawHitOverlay(){
  const t=1-hitTimer/HIT_DUR;
  ctx.fillStyle=`rgba(200,20,20,${Math.max(0,0.45-t*0.45)})`;ctx.fillRect(0,0,W,H);
  const a=Math.min(1,t*3)*Math.max(0,1-(t-0.4)*3);
  if(a>0){ctx.save();ctx.globalAlpha=a;ctx.fillStyle='#fff';ctx.font='bold 42px monospace';ctx.textAlign='center';ctx.fillText('HIT!',W/2,H/2);ctx.restore();}
  ctx.save();ctx.globalAlpha=Math.min(1,t*3);ctx.fillStyle='#c0392b';
  for(let i=0;i<8;i++){const ang=(i/8)*Math.PI*2,r=5+t*18;ctx.beginPath();ctx.ellipse(px+Math.cos(ang)*r,PLAYER_Y+Math.sin(ang)*r*0.5,3+t*3,2.5,ang,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

function rrect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function showMsg(t){msgEl.innerHTML=t;msgEl.style.display='block';}
function hideMsg(){msgEl.style.display='none';}

function draw(){
  ctx.clearRect(0,0,W,H);
  // 1. Full road (entire canvas, bridge will occlude middle section)
  drawFullRoad();
  // 2. Cars + labels in top gameplay zone
  drawCarsInZone(0, BRIDGE_Y);
  drawRoadLabelsAndArrows();
  // 3. Shadow ray + silhouette
  drawShadowAndRay();
  // 4. Bridge deck occludes the road behind it
  drawBridge();
  // 5. Peek strip (road visible below bridge)
  drawPeekStrip();
  // 6. Cars visible in peek strip below bridge
  drawCarsInZone(PEEK_Y, PEEK_Y + PEEK_H);
  // 7. Player on top
  drawPlayer();
  if(state==='hit')drawHitOverlay();
  scEl.textContent='score: '+score;
  lvEl.textContent='level: '+level;
  liEl.textContent='❤️'.repeat(Math.max(0,lives));
}
function loop(){update();draw();requestAnimationFrame(loop);}

showMsg('🌉 Shadow Frogger<br><small>Sunlight from below casts your shadow upward.<br>Guide your shadow across the road above the bridge.<br>← → move &nbsp;|&nbsp; ↑ ↓ shift depth<br><br>tap / press any key to start</small>');
initLevel();
loop();
</script>
</body>
</html>
