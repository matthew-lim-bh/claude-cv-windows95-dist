<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Clip region: full doc area minus the folded corner triangle -->
    <clipPath id="noFoldCorner">
      <path d="M 8,5 L 100,5 L 100,19 L 112,19 L 112,135 L 8,135 Z"/>
    </clipPath>
  </defs>

  <!-- Document body -->
  <path d="M 8,5 L 100,4.5 L 100.5,9 L 112,9.2 L 112.3,134.5 L 7.5,135 Z"
        fill="#FFFDF5" stroke="#1e1e1e" stroke-width="2.2"
        stroke-linejoin="round" filter="url(#roughen)"/>

  <!-- Folded corner (top right) -->
  <path d="M 100,4.5 L 100.5,18 L 112,18.3 L 112,9.2 Z"
        fill="#EDE8D5" stroke="#1e1e1e" stroke-width="1.8"
        stroke-linejoin="round" filter="url(#roughen)"/>
  <path d="M 100.2,5 L 112,9.2" stroke="#1e1e1e" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Center dividing line (slightly wobbly) -->
  <path d="M 60,8 Q 59.5,40 60.2,70 Q 59.8,100 60.1,134"
        stroke="#1e1e1e" stroke-width="1.6" fill="none"
        stroke-linecap="round" filter="url(#roughen)"/>

  <!-- ===================== LEFT COLUMN ===================== -->

  <!-- Face circle -->
  <circle cx="33" cy="32" r="16" fill="#FFFDF5" stroke="#1e1e1e" stroke-width="2"
          filter="url(#roughen)"/>

  <!-- Hair -->
  <path d="M 18,27 Q 22,16 33,18 Q 44,16 48,27" stroke="#1e1e1e" stroke-width="2"
        fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 21,22 Q 22,15 25,19" stroke="#1e1e1e" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 33,18 Q 34,11 36,16" stroke="#1e1e1e" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M 43,20 Q 45,13 47,19" stroke="#1e1e1e" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Left eye -->
  <ellipse cx="26.5" cy="31" rx="2.8" ry="2.2" fill="#1e1e1e" filter="url(#roughen)"/>
  <circle cx="27.4" cy="30.2" r="0.7" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="39.5" cy="31" rx="2.8" ry="2.2" fill="#1e1e1e" filter="url(#roughen)"/>
  <circle cx="40.4" cy="30.2" r="0.7" fill="white"/>

  <!-- Eyebrows -->
  <path d="M 23,26.5 Q 26.5,25 30,26.5" stroke="#1e1e1e" stroke-width="1.6" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 36,26.5 Q 39.5,25 43,26.5" stroke="#1e1e1e" stroke-width="1.6" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- Nose -->
  <path d="M 33,33 Q 31,37 33,38.5 Q 35,37 33,33"
        stroke="#1e1e1e" stroke-width="1.3" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- Smile -->
  <path d="M 27,40.5 Q 33,46 39,40.5"
        stroke="#1e1e1e" stroke-width="1.8" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- Ears -->
  <path d="M 17.2,30 Q 14.5,32.5 17,37" stroke="#1e1e1e" stroke-width="1.4" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 48.8,30 Q 51.5,32.5 49,37" stroke="#1e1e1e" stroke-width="1.4" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- LEFT: Large text blocks (thick chunky lines) -->
  <!-- Block 1 label -->
  <path d="M 11,58 Q 25,57 52,57.5" stroke="#1e1e1e" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <!-- Block 1 body -->
  <path d="M 11,65 Q 30,64 52,64.5" stroke="#1e1e1e" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 11,70 Q 35,69.5 52,70" stroke="#1e1e1e" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 11,75 Q 28,74.5 47,75" stroke="#1e1e1e" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- Block 2 label -->
  <path d="M 11,87 Q 22,86 50,86.5" stroke="#1e1e1e" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <!-- Block 2 body -->
  <path d="M 11,94 Q 32,93.5 52,94" stroke="#1e1e1e" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 11,99 Q 40,98.5 52,99" stroke="#1e1e1e" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 11,104 Q 26,103.5 42,104" stroke="#1e1e1e" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- Block 3 label -->
  <path d="M 11,116 Q 28,115.5 52,116" stroke="#1e1e1e" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <!-- Block 3 body -->
  <path d="M 11,123 Q 35,122.5 52,123" stroke="#1e1e1e" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 11,128 Q 30,127.5 48,128" stroke="#1e1e1e" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- ===================== RIGHT COLUMN ===================== -->

  <!-- Big "CV" — clipped so it doesn't bleed into the folded corner -->
  <g clip-path="url(#noFoldCorner)">
    <!-- C -->
    <path d="M 81,14 Q 68,11 68,23 Q 68,35 81,32"
          stroke="#1e1e1e" stroke-width="5" fill="none"
          stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)"/>
    <!-- V -->
    <path d="M 84,12 L 92,35 L 100,12"
          stroke="#1e1e1e" stroke-width="5" fill="none"
          stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)"/>
  </g>

  <!-- RIGHT: Detailed fine text lines -->
  <!-- Section 1 -->
  <path d="M 65,44 Q 80,43.5 108,44" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 65,49 Q 85,48.5 108,49" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 65,54 Q 78,53.5 100,54" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- Tiny divider -->
  <path d="M 65,60 Q 90,59.5 108,60" stroke="#1e1e1e" stroke-width="0.8" stroke-dasharray="2,2" fill="none" stroke-linecap="round"/>

  <!-- Section 2 -->
  <path d="M 65,66 Q 82,65.5 108,66" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 65,71 Q 88,70.5 108,71" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 65,76 Q 75,75.5 95,76" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- Tiny divider -->
  <path d="M 65,82 Q 90,81.5 108,82" stroke="#1e1e1e" stroke-width="0.8" stroke-dasharray="2,2" fill="none" stroke-linecap="round"/>

  <!-- Section 3 -->
  <path d="M 65,88 Q 84,87.5 108,88" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 65,93 Q 80,92.5 108,93" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 65,98 Q 86,97.5 102,98" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

  <!-- Tiny divider -->
  <path d="M 65,104 Q 90,103.5 108,104" stroke="#1e1e1e" stroke-width="0.8" stroke-dasharray="2,2" fill="none" stroke-linecap="round"/>

  <!-- Section 4 -->
  <path d="M 65,110 Q 83,109.5 108,110" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 65,115 Q 79,114.5 100,115" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 65,120 Q 88,119.5 108,120" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>
  <path d="M 65,125 Q 76,124.5 92,125" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round" filter="url(#roughen)"/>

</svg>